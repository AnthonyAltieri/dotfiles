interface:
  display_name: "NotionRead"
  short_description: "Analyze current Notion content without writes"
  default_prompt: "Use $notion-read to fetch this Notion content once, analyze it locally, and clean up temporary data."

dependencies:
  tools:
    - type: "mcp"
      value: "notion"
      description: "Notion MCP server for page discovery and fallback reads"
      transport: "streamable_http"
      url: "https://mcp.notion.com/mcp"
