interface:
  display_name: "notion-knowledge-capture"
  short_description: "Capture knowledge in Notion with bounded writes"
  icon_small: "./assets/notion-small.svg"
  icon_large: "./assets/notion.png"
  default_prompt: "Use $notion-knowledge-capture to capture this material in Notion and verify the authorized write."

dependencies:
  tools:
    - type: "mcp"
      value: "notion"
      description: "Notion MCP server"
      transport: "streamable_http"
      url: "https://mcp.notion.com/mcp"
