# Action key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Set vi-mode
set-window-option -g mode-keys vi

# Colors
set-option -sa terminal-overrides ",xterm*:Tc"

# Advertise OSC 8 hyperlink support for Ghostty and common SSH fallback TERM values.
set -as terminal-features ",xterm-ghostty:hyperlinks"
set -as terminal-features ",xterm-256color:hyperlinks"

# Use mouse
set -g mouse on

# Start window and pane numbering at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Ctrl+1..9 window switching handled by Ghostty keybinds
# (sends tmux prefix + digit -> selects window N)

# Prefix + v/s split panes while preserving the current working directory.
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Bell (used by Claude Code notification hooks)
set-option -g visual-bell off
set-option -g bell-action other
set-window-option -g monitor-bell on

# Clear Claude Code "!" notification when switching to a window (mark as read)
set-hook -g after-select-window 'run-shell -b "bash ~/.claude/tmux-notify.sh off-if-claude"'

# Plugins are declared through Home Manager.
